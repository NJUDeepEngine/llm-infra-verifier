title: LLM-Infra-Verifier
description: >-
  Formal verification framework for distributed tensor programs.
  Covers TP, PP, CP with spatial (placement) and temporal (overlap) verification,
  powered by Z3 SMT solver and symbolic execution.

remote_theme: just-the-docs/just-the-docs

color_scheme: dark

aux_links:
  "GitHub Repository":
    - "https://github.com/NJUDeepEngine/llm-infra-verifier"

aux_links_new_tab: true

heading_anchors: true

search_enabled: true

nav_sort: case_sensitive

back_to_top: true
back_to_top_text: "Back to top"

footer_content: 'Copyright &copy; 2026 NJUDeepEngine. Distributed under Apache 2.0 license.'

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: purple

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
